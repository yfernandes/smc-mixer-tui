# smc-mixer WirePlumber drop-in — route crossfade apps into their void sink AT CREATION.
#
# WHY THIS EXISTS
# ---------------
# When a channel's knob is `type: send` (crossfade), the daemon builds a routing
# graph anchored on a null sink named `smc_<tag>_void` (see docs/DAEMON_AND_AUDIO.md).
# A stream only obeys the fader/crossfader if it actually flows through that void.
#
# Without this file, a newly-created app stream is born on the DEFAULT sink (your
# headphones/speakers) and plays there audibly, BYPASSING the crossfader chain,
# until the daemon's 2 s poll notices it and moves it. That race is why "the fader
# doesn't control the app" and "the crossfader does nothing" — the audible stream
# was never in the chain. WirePlumber's own restore-stream hook (which also reads
# `stream.rules`) is the thing that otherwise decides the target, so we set the
# target here, before the first sample plays.
#
# WHEN TO USE IT
# --------------
# Install this drop-in when a configured application uses a crossfade/send knob
# and creates playback streams dynamically (browsers are the common case). It is
# not needed for ordinary volume-only channels or output sinks. Add one rule for
# every application that must enter an smc_<tag>_void graph at stream creation.
#
# `stream.rules` (NOT `node.rules`) is the key WirePlumber 0.5 applies to client
# playback streams, via scripts/node/state-stream.lua → match_rules_update_properties.
# `target.object` requests the sink by node.name. WirePlumber's restore-target
# policy may later reconsider that target, so the daemon also pins live stream
# metadata before explicitly moving it. When the void sink is absent (daemon
# down), WirePlumber falls back to the default sink gracefully.
#
# INSTALL
#   mkdir -p ~/.config/wireplumber/wireplumber.conf.d
#   cp extras/wireplumber/51-smc-mixer.conf ~/.config/wireplumber/wireplumber.conf.d/
#   systemctl --user restart wireplumber      # only needed once, at install time
#
# CAUTION: restarting WirePlumber re-links every node and may destroy the
# module-backed crossfader graph. The daemon detects missing void/gain sinks and
# rebuilds the graph on its next reconciliation. A fresh login is still less
# disruptive than a mid-session restart. In normal boot order WirePlumber starts
# first and loads this file before the daemon builds the chain.
#
# ADAPTING PER APP
#   - One rule per crossfade app. Match on a STABLE, per-app PipeWire property.
#     `application.process.binary` is best (survives tab/title changes). Find it:
#       pw-dump | grep -A40 '"Stream/Output/Audio"' | grep process.binary
#   - The target must equal the daemon's void name: `smc_<tag>_void`, where <tag>
#     is the device key in config.yaml (e.g. device `firefox` -> smc_firefox_void).
#   - The daemon logs the exact name at startup: `crossfader <tag>: <A> ↔ <B>`.

stream.rules = [
  {
    matches = [
      # Firefox / Zen. `zen-bin` for Zen; use `firefox` (or `firefox-bin`) for stock Firefox.
      { application.process.binary = "zen-bin" }
    ]
    actions = {
      update-props = {
        target.object = "smc_firefox_void"
      }
    }
  }
]
