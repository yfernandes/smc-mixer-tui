midi:
  device: "" # auto-discovered

defaults:
  input-knob:
    type: gain
  playback-knob:
    type: send
    bus-a: headphones
    bus-b: speakers
  output-knob:
    type: none
  # sync_mode: "zero"        # "zero" (default) or "soft_pickup"
  # pickup_tolerance: 2      # soft_pickup only: ±N CC units for crossing detection (default 2)

devices:
  noise:
    label: "White Noise"
    type: playback
    match: ~

  spotify:
    label: "Spotify"
    type: playback
    match: spotify

  youtube-music:
    label: "YouTube Music"
    type: playback
    match-title: "YouTube Music"

  firefox:
    label: "Firefox"
    type: playback
    match-regex: "firefox.*"

  comms:
    label: "Comms"
    type: playback
    match-regex: "discord|zoom|skype|teams"

  fifine:
    label: "Fifine Mic"
    type: input
    match: "fifine Microphone Analog Stereo"
    # sync_mode: soft_pickup  # per-device override; inherits defaults.sync_mode if absent
    knob:
      type: gain
    advanced:
      fader:
        type: effect
        effect: reverb
      knob:
        type: effect
        effect: echo
      mute-button:
        type: action
        action: toggle-monitor
      solo-button:
        type: action
        action: toggle-noise-cancel
      stop-button:
        type: action
        action: reset-effects

  speakers:
    label: "Speakers"
    type: output
    match: "Ryzen HD Audio Controller Analog Stereo"

  headphones:
    label: "Headphones"
    type: output
    match: "WH-1000XM4"

  master-out:
    label: "Master"
    type: output
    match: ~

exec:
  # Additive generic-router target. This does not affect existing audio pages
  # unless a router assignment below uses the same physical strip.
  brightness:
    label: "Monitor brightness"
    command: "ddcutil setvcp 10 {{value}}"
    scale: [0, 100]

router:
  # A router-assigned strip is exclusively router-owned; its events do not also
  # reach the legacy dispatcher.
  assignments:
    3:
      target: "exec:brightness"
      params:
        fader: "value"
  # Phase 3 pages: a router page can contain more assignments than the surface
  # has strips. Up/Down scroll the visible window while a router page is active.
  # The button must not collide with any legacy page button below.
  pages:
    - name: applications
      button: play
      assignments:
        - label: Spotify
          target: "pipewire:rule/spotify"
          params: {fader: volume, knob: crossfade, mute: mute, solo: solo, stop: playpause}
        - label: YouTube Music
          target: "pipewire:rule/youtube-music"
          params: {fader: volume, knob: crossfade, mute: mute, solo: solo, stop: playpause}
        - label: Firefox
          target: "pipewire:rule/firefox"
          params: {fader: volume, knob: crossfade, mute: mute, solo: solo, stop: playpause}
        - label: Comms
          target: "pipewire:rule/comms"
          params: {fader: volume, knob: crossfade, mute: mute, solo: solo, stop: playpause}
    - name: lights
      button: seek-forward
      assignments:
        - target: "exec:brightness"
          params:
            fader: "value"

pages:
  main:
    button: none
    faders:
      0: spotify
      1: youtube-music
      2: firefox
      3: ~
      4: ~
      5: ~
      6: ~
      7: master-out
    knobs:
      0: fifine
      1: ~
      2: ~
      3: ~
      4: ~
      5: ~
      6: headphones
      7: speakers

  inputs:
    button: rec
    channels:
      0: fifine
      1: ~
      2: ~
      3: ~
      4: ~
      5: ~
      6: ~
      7: ~

  outputs:
    button: pause
    channels:
      0: speakers
      1: headphones
      2: ~
      3: ~
      4: ~
      5: ~
      6: ~
      7: ~

  system:
    button: prev
    channels: {}

  custom:
    button: next
    channels: {}
